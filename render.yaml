# FIT — Web Service no Render (API + webhook global UAZAPI)
# Repositório: LucasNeuro/fit (branch main)
#
# Opção A — raiz do repo (mais simples no painel):
#   Build:  pip install -r requirements.txt
#   Start:  uvicorn app:app --host 0.0.0.0 --port $PORT
#
# Opção B — Root Directory = backend:
#   Start:  uvicorn api.main:app --host 0.0.0.0 --port $PORT

services:
  - type: web
    name: fit-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: ENV
        value: production
      - key: WEBHOOK_VALIDATE_QUERY
        value: "true"
      # Preencher no painel Render (Environment):
      # MISTRAL_API_KEY, SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY
      # UAZAPI_BASE_URL, UAZAPI_ADMIN_TOKEN, WEBHOOK_SECRET
      # PUBLIC_API_URL=https://fit-api.onrender.com  (URL do próprio serviço)
      # DEFAULT_GYM_ID, UAZAPI_SEND_TEXT_PATH=/send/text
